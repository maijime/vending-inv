{% extends "base.html" %}
{% block header_title %}✏️ Edit Slot{% endblock %}

{% block content %}
<div class="card-header">Slot #{{ item.item_num }}</div>
<div class="card">
    <form method="POST" action="/items/update/{{ item.item_num }}">
        <div class="form-field">
            <label>Product</label>
            <select name="product_id" style="width:160px;">
                <option value="">— None —</option>
                {% for p in products %}
                <option value="{{ p.id }}" {% if p.id == item.product_id %}selected{% endif %}>{{ p.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-field">
            <label>Capacity</label>
            <input type="number" name="capacity" value="{{ item.capacity }}" required min="1" style="width:60px;">
        </div>
        <div class="btn-row">
            <a href="/inventory" class="btn btn-secondary" style="flex:1;">Cancel</a>
            <button type="submit" class="btn" style="flex:1;">Save</button>
        </div>
    </form>
</div>
{% endblock %}
