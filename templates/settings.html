{% extends "base.html" %}
{% block title %}Settings{% endblock %}

{% block content %}
<div class="page">
  <div class="page-title">Settings</div>

  <!-- Info -->
  <div class="card">
    <div class="card-title">Info</div>
    <div style="font-size:14px;color:var(--muted);line-height:1.8">
      <div>Logged in as: <span style="color:var(--text)">{{ admin_user }}</span></div>
    </div>
  </div>

  <!-- Logout -->
  <a href="{{ url_for('logout') }}" class="btn btn-danger btn-block">Log out</a>

</div>
{% endblock %}
