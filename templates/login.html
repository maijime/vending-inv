<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vending — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
            background: #0f1117; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            color: #e2e8f0;
        }
        .login-card {
            background: #1a1d27; border: 1px solid #2a2d3a;
            border-radius: 16px; padding: 36px 28px; width: 100%; max-width: 340px;
            margin: 24px;
        }
        h1 { font-size: 26px; font-weight: 700; text-align: center; margin-bottom: 4px; }
        .sub { font-size: 13px; color: #64748b; text-align: center; margin-bottom: 28px; }
        label { font-size: 12px; font-weight: 600; text-transform: uppercase;
                letter-spacing: .05em; color: #64748b; display: block; margin-bottom: 6px; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 11px 14px;
            border: 1px solid #2a2d3a; border-radius: 10px;
            font-size: 16px; margin-bottom: 16px;
            background: #0f1117; color: #e2e8f0;
        }
        input:focus { outline: none; border-color: #3b82f6; background: #0f1117; }
        .btn {
            width: 100%; padding: 13px; background: #3b82f6;
            color: white; border: none; border-radius: 10px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: opacity .15s;
        }
        .btn:active { opacity: 0.8; }
        .flash { padding: 9px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; text-align: center; }
        .flash.error   { background: #450a0a; color: #fca5a5; }
        .flash.success { background: #052e16; color: #86efac; }
        .flash.warning { background: #422006; color: #fde68a; }
        .links { text-align: center; margin-top: 18px; font-size: 13px; }
        .links a { color: #3b82f6; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Vending</h1>
        <div class="sub">Dashboard</div>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
        <div class="flash {{ cat }}">{{ msg }}</div>
        {% endfor %}
        {% endwith %}
        <form method="POST">
            <label>Username</label>
            <input type="text" name="username" required autofocus autocomplete="username">
            <label>Password</label>
            <input type="password" name="password" required autocomplete="current-password">
            <button type="submit" class="btn">Log In</button>
        </form>
        <div class="links">
            <a href="/reset-password">Forgot password?</a>
        </div>
    </div>
</body>
</html>
