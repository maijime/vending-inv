{% extends "base.html" %}
{% block header_title %}🏪 Products{% endblock %}

{% block content %}
<div class="card-header">Add Product</div>
<div class="card">
    <form method="POST" action="/products/add">
        <div class="form-field">
            <label>Name</label>
            <input type="text" name="name" required placeholder="Doritos" style="width:140px;">
        </div>
        <div class="form-field">
            <label>Unit Cost</label>
            <input type="number" name="unit_cost" required step="0.01" min="0" placeholder="0.50">
        </div>
        <div class="form-field">
            <label>Category</label>
            <select name="category" style="width:140px;">
                <option>Chips</option>
                <option>Salty Snacks</option>
                <option>Sweets</option>
                <option>Drinks</option>
            </select>
        </div>
        <div class="btn-row">
            <button type="submit" class="btn btn-full">Add Product</button>
        </div>
    </form>
</div>

{% for cat, prods in categories.items() %}
<div class="card-header">{{ cat }}</div>
<div class="card">
    {% for p in prods %}
    <div class="list-row" style="flex-wrap:wrap; gap:8px;">
        <div style="flex:1; min-width:120px;">
            <div class="list-row-label">{{ p.name }}</div>
            <div style="font-size:12px; color:var(--text2);">
                ${{ "%.2f"|format(p.unit_cost) }}/ea · Stock: {{ p.home_qty }}
            </div>
        </div>
        <form method="POST" action="/products/delete/{{ p.id }}" onsubmit="return confirm('Delete {{ p.name }}?');" style="display:flex; gap:4px;">
            <button type="submit" class="btn btn-small btn-danger">Delete</button>
        </form>
    </div>
    {% endfor %}
</div>
{% endfor %}
{% endblock %}
